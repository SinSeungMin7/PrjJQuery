<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
</style>
<title>Insert title here</title>
<style>
	h1 { color:white; }
	.high-light-0 {background-color: red;   }
	.high-light-1 {background-color: orange;}
	.high-light-2 {background-color: yellow;}
	.high-light-3 {background-color: green; }
	.high-light-4 {background-color: blue;  }
	.high-light-5 {background-color: navy;  }
	.high-light-6 {background-color: purple;}

</style>
<!-- jquery CDN -->
<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

<script>
	$(function() { 
		$('h1').each( function( index, item ) { // h1의 각각에 대해서 적용한다 item 은 찾은 h1을 의미 ex) <h1>item - 0</h1>, <h1>item - 1</h1>, ...
		//	console.log(item)
		//	console.dir(item)
		//	item.css('background-color', '#A0A0A0') //item.css() not a function() 함수가 아니다
			console.log( $( item ) )
		//	$( item ).css('background-color', '#A0A0A0')
			$( item ).addClass( "high-light-" + index )
		});
		
	})	
</script>

</head>
<body>
    <h1>item - 0</h1>
    <h1>item - 1</h1>
    <h1>item - 2</h1>
    <h1>item - 3</h1>
    <h1>item - 4</h1>
    <h1>item - 5</h1>
    <h1>item - 6</h1>
</body>
</html>
