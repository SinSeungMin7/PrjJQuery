<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>

</style>

<script src="https://code.jquery.com/jquery.min.js"></script>
<script>
		let array = [
			{ name : 'Naver',      link:'https://www.naver.com'      },
			{ name : 'Nate',       link:'https://www.nate.com'       },
			{ name : 'Daum',       link:'https://www.daum.net'       },
			{ name : 'Google',     link:'https://www.google.com'     },
			{ name : 'Microsoft',  link:'https://www.microsoft.com'  },
		]	
		$( function() {
			let tag = ''
			// 대상이 배열일때는 $.each(array)
			$.each(array, function( index, item ) {
				tag += '<a href="'+ item.link + '">'
				tag += '<h2>'     + item.name + '</h2>'
				tag += '</a>'
			})
			
			tag += '<select name="link">'
			tag += '<option>--선택--</option>'
			$.each(array, function( index, item ){
				tag += '<option value="' + item.link + '">'
				tag += item.name
				tag += '</option>'
			})
			tag += '</select>'
			
			$( 'body' ).append( tag )
			
			$('select').on('change', function( index, item ){
				console.log ( $('select>option:selected') )  // !!!중요 : 'select>option:selected' 기억하기
				location.href = $('select>option:selected').val() // .val() : 그항목이 가지고 있는 주소를 불러온다
			})
	} )
</script>
</head>
<body>

</body>
</html>
